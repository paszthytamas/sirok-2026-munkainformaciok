name: GitHub Pages közzététel

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Repository letöltése
        uses: actions/checkout@v4

      - name: Python beállítása
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Függőségek telepítése
        run: pip install -r requirements.txt

      - name: Excel és Markdown feldolgozása
        run: python scripts/build_data.py

      - name: Nyilvános futásidejű konfiguráció elkészítése
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ vars.SUPABASE_ANON_KEY }}
        run: python scripts/write_config.py --url "$SUPABASE_URL" --anon-key "$SUPABASE_ANON_KEY"

      - name: Feldolgozó tesztek
        run: python -m unittest discover -s tests -p 'test_*.py'

      - name: JavaScript tesztek
        run: npm test

      - name: Pages beállítása
        uses: actions/configure-pages@v5

      - name: Weboldal feltöltése
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Közzététel
        id: deployment
        uses: actions/deploy-pages@v4

